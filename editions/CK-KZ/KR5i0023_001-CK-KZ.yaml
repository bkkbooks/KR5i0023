seq: 1
front:
  text: 先天斗帝敕演無上玄功靈妙真經重刊道藏輯要先天斗帝勅演無上玄功靈妙眞經孚佑上帝純陽吕祖天師疏解
  hash: sha256:d535b62cfebb38b2dd4aff41685ba01dde483fb5b6df856592043a0a2cea68ac
  markers:
  - {type: page-break, offset: 14, content: '', id: CK-KZ_KR5i0023_01p001a}
body:
  text: 斗爲天樞玄功之祖今逢時節因緣先天斗帝勅演此無上眞經爲天仙家至玄之功故曰玄功曰靈曰妙卽直指玄功之至精微處此經九品實爲金丹妙典洗盡從來譬喻隱秘之詞使人人共由大道直證天仙後學聖眞幸寶玩之莫易視也香讚玄靈妙典萬古眞傳圓明道寶麗諸天秘密個中筌九九重宣慈濟永無邊大聖先天圓明道姥大天尊三稱此香讚爲諷經最要科儀寶號三稱卽皈身皈命皈神之至意也至心皈命禮西天竺國大智光中眞空妙相法王師無上玄元天母主金光爍處日月濳輝寶杵旋時鬼神失色顯靈踪於塵世衞聖駕於閻浮眾生有難若稱名大士尋聲來救苦大悲大願大聖大慈聖德巨光天后摩利攴天大帝圓明道姥天尊此斗帝寶誥䖍誠禮誦感應至神有不可思議功用讚偈本壇恭逢斗帝聖誕舉行慶祝典禮幸䝉慈照普被恩光勅演無上玄功靈妙眞經九品洵萬刦之難逢亦大慈之隨應無極子謹稽首拜手當壇呈偈曰瑤天大法祖大愿度眾生勅演靈妙品慈悲無等倫玄元通啟澈萬載荷深恩先天原一炁著經闢鴻文大覺慈尊法無緣不是因一超千古刦一度萬含靈此法無上法此功無上乘諸天齊赴會萬法盡歸宗覺是天地朗源從萬派清一闢鴻濛路俯垂現在恩前前並後後同澈大道根爲說靈妙法靈妙卽眞經九九通玄秘三三是一源合同而神化由凡入聖眞是大慈悲愿顯大法通神盡人齊皈命敬信永奉行吾此偈已將全經秘妙隱括無遺先指明壇地爲覺源精舍傳經之曰卽係在九皇慶祝期内此九品眞經傳之非偶必因地因人因時而後法祖本大愿力具大慈悲沛大恩澤乃於大覺慈壇著經闢文乘因緣以超刦度生也此無上法無上乘洵萬劫難逢之奇遇萬古不傳之妙寶九九玄秘與三三一源合同神化大道之根歸宗於是左宫星君讚曰妙法道祖普度羣生臨壇說偈顯眞經義澈圓靈一點列高眞萬古千年派衍深卽是大慈心此言我天仙派由此經廣衍以成化度萬古千年學道之人共相繼續以爲金丹法派正傳所以經内亦云一起參證派入天仙又曰筏是法筏繫於覺壇又曰回翁守此接引羣生也先天斗帝圓明道姥大天尊寶訓斗萬天之上萬法之宗玄通微妙是眞功拜禮從容日月參明在此中法不說來法無窮眞是虛空覺得圓靈識性同誓愿深宏普度此羣䝉道心現處卽是化工蒂固根深千秋壇運通喜氣溢寰中大地無遮仁慈利濟大法無上宫道祖法壇派遠綿長功修度成爾法子等衆曰禮所禮能禮所禮不必朝拜爲朝禮趺坐冥心卽是禮禮到恍恍惚惚是能禮禮到空空玄玄是能禮能禮靈妙眞玄訣禮到昇騰是眞禮道祖壇中所呈悉如律令施行勅斗帝此訓揭全經道蘊爲勅演鴻綱萬古玄眞斯爲祕諦眞一字一蒼胡頡寶上合三清三洞之眞文下開萬天萬法之眞宗不可端倪不落詮解葢緣我覺源法壇將綿長此天仙法派而功修有度成者故直示心傳洞達無隱篇中切切指點屢屢唱嘆玄通微妙包孕無窮覺得圓靈如是如是靈妙緣起品第一紫微星君曰藐爾一身配乎三才靈踰萬物至寶内含與生俱足無區聖凡唯彼克葆上際下蟠一朝失守人禽攸關此不彼顧我無爾判有大智炬如日之懸有接有繼爲範爲閑莫推莫挽或照或監得其宗主至極至玄明明在上早濟早援莫之自溺無息汝肩以月以日積累如年有其一得後不越先唯其通復無外中邊此眞一息功在綿綿盡天地量包古今賢惟功惟實自證自參一起參證派入天仙道法之祖永度人天人天普度斯爲妙原吾奉法勅著靈妙篇開章一義深深淵淵人人了了卽躡瓊巓仙祖俯偈然然其然九品皆闡靈妙此篇九品之緣起也紫微星君爲天北極妙握仙柄是萬星宗主卽性命根源斗帝勅瑤天第一吉星於古今第一覺壇傳古今第一道典誠天仙家金丹秘寶眞傳開口說一身配三才含至寶已是澈上澈下澈始澈終路頭且直揭曰有大智炬如日之懸是惟以圓明大道爲清靜眞宗非得其宗主未易窺此至極至玄之妙體通復而達中邊也然又恐人未知虛空中眞有妙有又切示根蒂曰此眞一息功在綿綿由實功參證則派入天仙自能契道法之祖而永度人天矣深深淵淵靈妙之實功也人人了了靈妙之實境也高躡瓊巓而瑤天在目矣靈妙持心品第二紫微星君曰爾時斗姥慈尊坐無極宫照臨下土慈悲眾生發普濟愿施大慧力顯大神通嗟爾眾生罔識本性具足圓明沈淪漸晦於是乘大法會降大法壇說明大乘啓彼昏昏欲求天仙先還本原本原之地不可方物卽之有象探之甚深窮竟萬變不離方寸人具此物不以物名名之以心仍滯於名此名此象莫測其靈靈卽本原非此塊心欲力持者持此爲經吾道曰明乃是明明明何以啓仍歸本根此根觸法不可形形操存有要晝夜持循如保嬰兒如對至尊如防堤邊如馭羣英莫撓擾散毋弛脫紛有操有縱可相可形放之則逸滯之不靈我與爾靜乃攝眞精靜猶不靜動亦堅貞誠虚體用包孕無垠從此充極不越此經是人是我悉自交營上乘顯緒法具夙乘其如彼岸卽以爾登有大世界爲大累縈欲河不涉摧破愁城無多現相得靜斯呈靜呈相現自無勞乘我不求爾爾不我侵斯爲入手先證分明持住如是乃望前程慈尊唯然先照天君道外無心心外無道惟持斯靈惟靈斯妙此章特言持心是聖凡第一大關鍵先敘勅演因由乘九皇之法會降覺源之法壇特垂此大乘經典以爲天仙持心妙法夫本原之地彌綸宇宙而實不離此方寸之間曰卽之有象探之甚深持之之法也操存有要晝夜持循綿綿密密火候足則金丹立成下四句形容持心之方卽養丹之妙諦又戒之曰莫撓擾散毋馳脫紛誠恐人徒事虛靈故曰有操有縱可相可形放之則逸滯之不靈我與爾靜乃攝眞精是性命雙該體用俱備曰包孕無垠已全示人眞蒂矣持之永久而有不超登彼岸者乎此大世界卽法界卽鼎爐但不爲欲愁煩惱等障蔽則眞相立現一一遞證分明矣持住如是乃以如是持心非滯守中宫收心腔子裏便以爲求放心者比也噫如是之法若未能聞遽欲持心何由而得靈妙之消息乎靈妙解脫品第三紫微星君曰太空一點萬象虚涵浮雲苒苒飄飄無碍體相通澈不滯端倪問之太虚白雲無歸夫人之心稱曰最靈最難降伏莫此爲甚如是持循是能降伏爾等眾生旣降伏已乃可復靈靈何不靈是有妙法法只一法解脫眞訣嗟爾羣靈膠粘塵窒日入日深如何是出有此解脫如起沈疴豁然清爽如出重圍坦坦蕩蕩如闢暗室廓然光明如遇荆榛一毫不挂此大智慧是大瀟洒求仙求佛脫離苦境境苦不苦不苦苦境此以終身總不能振如蠅附羶風不能逐如蛾赴火扇不能推自甘自結乃無能爲由降伏故力大於身舉手卽開舉步卽入舉頭卽見舉念卽獲如是解脫解非他解脫則眞脫玄元妙楔一棒打破前章言持心固是聖凡關鍵然非解脫止是色身邊事縱極精進亦無成就故此篇尤爲喫緊爲人處但解脫非易總緣一點靈明窒於塵緣日入日深如何是出故必如是持循如是降伏而後能如是解脫也如起沉疴八句是極形容解脫瀟洒之妙境苦不苦十句又申言所以不解脫之故總欲人自解自脫以玄元之妙楔打破日入日深之塵窒原是力大於身果能如是自然舉手卽開舉步卽入舉頭卽見舉念卽獲也一棒二字具有微義後學聖眞所宜着眼切莫孟浪讀過靈妙精進品第四紫微星君曰於穆維天穹窿其體視之不見聽之不聞談之者衆上之也難惟仙佛祖先自上昇繼發慈愿累劫度人人眞能求無不度成求度善信旣諸解脫從如何証此無他求唯自精進人心了明結習未離非復舊染卽隋四肢中心瞭然在自証前日復一日年復一年甫其進步效未卽著欲速易退至道難幾魔橫障竪處處阻撓心有所攝動處惕然由不制伏碍則形焉亦曰心性制諸魔外此則莫達彼受其累洞非不明左繞右縈明不是明眞繞眞縈習成莫救長此隳頹分明前路不行不達是無阻隔終莫引援又其結深漸積爲性如是自安前程自棄雖具大愿兼大法力莫能救濟誠何自唘大丈夫起此心直的如矢在弦求之專一志正體端無能累我一發中堅此不可移彼無能助如趨如赴或失之後孜孜皇皇不惜其他唯有一是無紛無訛先後一致終始同誠綿密之功不息不爭人見云何志趣如生此有正訣各不爲謀不費慳財不纒俗塵只一猛勇立進無垠要求眞功須問眞心好無以上所欲莫甚若加策勵愧怍悲懼有此等心益堅前念黽勉自課早不宜晚遵之而行前望不遠此章言精進之功全在克去舊染制伏身心以靈明寶鑑返照省察刻刻使惺惺常存而魔外自袪蓋人生結習旣深所以障業重而智光晦必須精進專一志無時不正體無時不端則内外雙修靜動交養方可一發中堅自無不破之的如趨如赴六句是形容精進極專一處無後先無終始惟以一誠貫注此綿密之功總如是之不息不爭而已是卽精進正訣故曰要求眞功須問眞心好無以上所欲莫甚葢退亦此心進亦此心塵窒亦此心解脫亦此心但時刻常持靈妙之心以求解脫而於道也好無以上問之於心所欲莫有更甚於此者則不求精進而自精進矣又恐久而或怠故又示人當常起愧怍悲懼等心以自加策勵則前念益堅後功無懈自望前途不遠而入道矣靈妙布施品第五紫微星君曰佛法三乘首闡金經明心見性無住著相祇樹園中莊嚴佛土恒河沙數七寶布施不若誦持爲功德優布施無量亦無等差七寶弗如是爲誦持爾衆生等當無盡著視根於眼通此眼界洞澈諸天上矚眞光下及含靈所有利益河沙難量聲觸於耳以此耳順天籟遙通八方和樂中内旁澈聰以利濟超離億數鼻舌身意亦如是觀此六根者是住非住著之斯蔽達之卽通惟我自達無借於外以我住我事幾成敗前望卻阻無本具性内慳自障不超古今大喜捨愿斯脫䝉塵何繫何縈一推卽遠有諸善緣乃接續至佛乘敎明吾道益尊身有三寶是則眞靈珍惜護持不遺寸心欲求此寶先行利濟六根布施三寶斯貴太上遺經只此一義乘分上下道惟獨位亘古今來瀰淪布濩通被十方周遍三界恢之彌廣擴之無窮操之於内不踰寸地覆載生成充乎其際惟此一尊根於天地不漓不雜只在自持有諸内者不奪於外附於後者撒手施去眞視眞聽自入玄元生生滅滅萬趣超然自持此念不謀他人不踰霎頃一持一得一噴一醒夫然後效眞實前程布施原兼内外財施法施皆外也金剛經云不應住色布施不應住聲香味觸法布施應如是布施不住於相葢言應無所住行於布施也此經於精進之後卽繼之以布施其義甚深其道甚大非僅七寶恒河沙數布施不足以言布施卽身命布施亦不足以言布施何也以猶有住著卽非靈妙布施之至道也故經中云此六根者是住非住著之卽蔽達之斯通明言無住相布施之妙又恐騖空者涉於茫蕩因直指曰身有三寶斯則眞靈珍惜護持不遺寸心俾人知妙行無住之地而並不著妙行無住之迹乃爲形神俱妙之道故曰六根布施三寶斯貴太上遺經只此一義乘分上下布施之察於上下也道惟獨位布施之會於歸極也亘古今來六句仍言布施之充乎其量操之於内不踰寸地仍言布施之樞紐妙握眞宰旣不落空仍無住著此玄靈妙道所以於佛乘同契眞空妙有妙有眞空玄禪之功皆不外是彼以昭昭靈靈爲佛法者必不知修大覺金仙破澈六陰之實詣以色身爲道法者必不知僞道修形非大羅天仙之金丹妙道又不知佛所斥之十種仙原非三清大道卽我輩亦以此十種爲非也今先天道祖破萬古之盲瞶示妙道於一乘就金剛之旨切實言之由此布施之妙至於眞視眞聽則天眼天耳皆通自漸入玄元眞境是眞實前程也布施之義大矣哉靈妙離欲品第六紫微星君曰人身易敝眞性不漓性全其眞有守則見千萬累劫如是衆生各具一點此是大同分見合見維彼聖眞眞則克明昏濁凡夫性失其眞眞何以失非其本原如彼乘珠寶光透瑩沉於深淵淤泥其體不知愛惜常住汙泥若求此者拔之於淵洗濯其身卽洗卽拔眞光乃露是珠不染只爭此功高明古鑑無不呈照久埋深阱塵土蒙覆不求懸照任爾塵封遇有識者起之地下濯磨其面拂拭其光光乃煥發是鑑不埋自甘塵土光則不澈誰執其咎人之眞性如鑑如珠凡夫不明如在泥塗此爲大欲累劫纒縛不脫不離如輪之轉輾轉相循失其本面求超入者離欲爲尊此之謂離不容一息華藏微塵有欲必爭其示之界不少寛貸能離則人不離非類仙佛慈濟離此達彼總不離此莫能望彼是眞離者其眞立見不疾不速功爭斷續良農去莠一日不盡再加功深盡淨乃竟不愼始勤必然終怠怠不能離勤亦非離爾欲仍熾自荒於嬉惟知綿綿其離則專不見爲離離則眞全此斵眞關圓靈現前我法我訣先賢後賢循之者聖執之者凡杳冥虛無渾合自然離欲爲修養要緊關頭顯佑黃子云人生血氣之累天之授於庸衆尤淺授之學道者偏深斯言最合試看人每於大有得後欲念轉似較平日更濃卽可騐也此品列於精進之後是憐愍學道之人於將成時駕一寶筏佛法曰離欲尊金經曰離欲阿羅漢與吾道同旨昔月宮天曜尊者奉寶光幽照如來法旨云無上妙道是先從身心上討本原離欲之旨是無上玄元之妙此欲字千看萬看總要從皈依心定住離者去而遠之之義要離得實在有一分便眞一分能眞得此字秘訣欲字方可通身退去矣離欲一義卽是澈上下眞根蒂可仙可佛卽爲頂上圓光並在我覺源壇垂示寶偈曰清虚一炁本圓靈悟澈浮空道運昇只向空中橫竪取一人一點卽分明正於此品大相印合且欲字要看得細所賅甚廣凡一切常態世情及愛慕因緣稍有動心卽謂之欲必須一塵不染一絲不挂方離得淨盡而三界可超人生一點圓明本來萬古常存如珠如鑑經中指示甚明前半旣詳言之矣而復點明曰人之眞性如鑑如珠凡夫不明如在泥塗此爲大欲累劫纒縛此不必逐字訓詁學者總宜細心體味經中又示警曰不脫不離如輪之轉輾轉相循失其本面言不離欲卽不能出輪迴生死而日染日深將失其本面矣恐人將離字看得粗因申言之曰此之謂離不容一息華藏微塵有欲必爭其示之界不少寛貸此理欲機關判別在毫芒之際其界稍有不清則汨淆其有守卽見之性明而不得洗濯拂拭之功是以昏濁凡夫難成聖眞也華藏微塵句下爭字界字含無上玄微之妙訣未易指破急須著眼仙佛慈濟四語言玄禪同此一乘是眞離者其眞立見功在於離欲效在於見眞欲離得愈遠眞見得愈眞此三敎至詣之的旨不疾不速功爭斷續八字乃金丹妙道之正傳淺者見淺深者見深由人自証未可言詮良農六句始終一勤然不知綿綿之眞功則不但怠不能離卽勤亦非離何也見以爲離仍著法邊際此中微妙非箇中人不能語非過關人不能行故曰不見爲離離則眞全此斵眞關圓靈現前噫全眞眞全前現現前萬古妙道大哉玄元觀經云我法我訣先賢後賢循之者聖執之者凡已分明自下注腳矣至末云杳冥虚無渾合自然此非泛作闊落語亦非虚摹離欲景象此八字聖凡俱遣我法無執杳冥二字賅天仙之全功虚無二字乃金丹之妙鍊渾合二字實飛昇之階梯至自然則形神俱妙矣此離欲之實騐也靈妙清淨品第七紫微星君曰渾虚太清玄明眞淨機緘初肇無物無名此爲至極玄元杳冥無原無極無爲無爭三才旣定陰陽道著道還本原渾沕無形累世累劫道心人心緣心而具性卽生情情緣情結情結障深非道累心非心累道心不累身性不累情朗朗圓明高懸古今業身業積乃累心性此清淨體業濁塵紛種種愛欲蒙蔽性明一緣一障障濁河深情積爲愆愆結惡重是不掃除愈熾愈焚嗔貪煩惱怖恐畏驚如是輾轉淨域千里要自逃匿牽縛莫解爾諸法子由堅定持得離欲天緣離欲故前路坦坦蓮出汙泥品愈清潔若由火種清則無上金剛火煉堅貞其體若陶化工質堅無等此清淨者入聖階梯証玄妙境汙泥亦清囂市亦淨深山不清古洞不淨清清淨淨不呈於境有尋得處此境乃眞以塵網身何處尋境我與爾衆同皈大道欲尋此境叩之太上太上無爲是爲至上有爲之爲卽修無爲爲爲非有有有非爲無爲非有有爲非無無無有有爲爲有無由有爲故入於無爲由無爲故乃至非爲非爲之爲乃無不爲乃可有爲乃可無爲如是說已清淨其幾由清淨故乃澈乃希希有妙道法力通神不神之神神乃法神法云身法非法乃法非法非非法乃眞神由中眞入至道目前何爲視聽瞻之在上上不在上是上之上無上之我其爲大羅人由清淨厯諸參証玄之與玄如通其竅要卽臻者如渡求筏筏是法筏繫於覺壇鼓浪乘風浪靜波恬棹通彼岸明月在天不要妄乘舉頭卽是此何以故天不外天月非天月滴滴歸根卽於此宅我道祖壇具此法筏載清載淨綿綿不竭更證眞源諸法莫說此承上章而言清淨固不在境地上論亦非僅潔齊身心已也玄妙之境是爲清涼淨域人能脫然離欲方可直入眞界觀開首云渾虚太清玄明眞淨機緘初肇無物無名此爲至極玄元杳冥六句可見經旨甚深未容淺窺也爭者理欲相爭之幾人能人此清淨眞境則一切事物皆可由妙觀察智化爲妙明圓覺之境處處無碍故曰無爲無爭夫人心道心判在危微外緣最易膠粘人每因業而累身因身而累心因心而累性種種愛欲蒙蔽性明皆由塵情爲之顚倒情積爲愆愆結惡重以致朗朗圓明之淨域輾轉背馳奚啻千里之遙是必痛自掃除將嗔貪煩惱恐怖畏驚等念打掃得空空洞洞堅定自持得離欲天而後前路坦坦矣然又不得厭喧求靜避俗求眞墮入二乘甲裏故曰蓮出汙泥品愈清潔若由火種清則無上金剛火煉堅貞其質若陶化工質堅無等是言正好就世緣塵情易染難斷處淘鍊清淨法身方是入聖階梯所謂在世出世在塵出塵也且玄妙之境果能實實印證則汙泥亦清囂市亦淨古來大羅天仙或依糞堆雪窖或入酒肆淫房而清淨之體自在習染之汙愈明否則卽深山亦不清古洞亦不淨清清淨淨原不呈於境而自有眞清眞淨之實境非叩之太上何能得之耶太上無爲十八句是闡大道之妙卽清淨之原也希有妙道八句是言大法之神惟清淨可入也故曰由中眞入至道目前至何爲視聽六句隱指大羅之天樞默契清淨之端倪天機隱秘未敢遽洩後學聖眞誠身證夫玄之與玄自然能通其竅矣夫至道微妙固不易臻而要非無門可入我明明設一渡世法筏繫於覺源寶壇只要人能清淨皈依力持五戒性命雙修則棹通彼岸而明月在天矣故曰舉頭卽是然天非外天也月非天月也人所本具各有性天性月根於身之眞宅但不爲氣拘物蔽則青天朗月何有纎翳乎滴滴歸根卽於此宅是雙關語亦是如語實語葢鑒我眞誠永久如是慈腸一片普度世人恐彼悠忽者當面錯過機緣故切指其地爲萬古常存億劫難逢之寶地而又申言之曰我道祖壇具此法筏載清載淨綿綿不竭更証眞源諸法莫說噫慈悲指點之意至深切矣吾亦惟是常持初愿永護是壇以仰答天勅之重與大士菩薩共圓成此利濟之心在源中作清淨筏以待飛渡者飛渡無難始於持戒終於清淨而已靈妙煉虚品第八紫微星君曰大道之宗萬法之祖運神於虚包孕萬有形形相相色色空空只此上下通幽澈微秘密玄靈闔闢之機虚中涵養章美於外細無不入大莫之載穹穹者天日月照臨四維八極度量難齊星羅碁布象麗其上聲臭閴寂莫測莫名扣萬啓一乃含大美大寶曰三精與神炁與身具存先身而立豈立身先更先天地無始劫來於今罔替一人一具千萬化身千萬具足具足之體是萬還一其昭明明其繫密密存乎人者莫良於此三歸一物一化而三是三非三是一非一非三非一一一三三非三非一是一是三曰惟此寶具足莫參總由有象以歸無象按之至實實而仍虚充虚之量萬變莫窮煉之爲要名之難紀爲虎爲龍曰鉛曰汞於坎於離位置其地木植火炎又充其類極形之肖極名之似名之形之不出一是抛卻卽走操之斯有聖不異凡仙與佛偶凡夫異等惟此一本增減不形生滅無盡具此大者百體率從從之百歧乃生色相相不一相四相終累誰爲空者莫煉其至煉則超之非比物類胎卵濕化蠢動而已佛性亦靈亦識其具矧靈於物胡不煉此可爲可追可進可啓玄則空空靈無不通通靈啓玄妙秘寰中鑰槖開然萬象羅前渾然無物自然生生執靈往運不識其程形聲動靜表裏圓明叩之寂寂聽之冥冥若愚若晦若亾若存存乎至道煉虚歸眞此品乃玄通微妙眞功昔吾與百丈佛祖同降覺壇祖云道曰靜釋曰止靜與止一而已一者何惟心造心本虚無方體煉其虚道在邇青華上帝亦云結丹之道一而已矣一無他虚而已矣煉丹者煉虚也虚非空空之虚乃實實之虚虚非散散之虚乃渾渾之虚煉虚而成其爲虚則丹成矣形神俱妙者形神俱虚也又曰煉丹件件皆虚黍珠一粒渾然太虚之體又曰修持之要千聖萬眞總歸寂滅學道而不至於寂滅未有能度劫者仙佛有分在煉性煉炁之間究竟到得無上根源就是氣也是性長生也是寂滅何也仙家所煉之炁葢有超出於陰陽五行之外者所謂元始以來一點靈光渾融週遍太和至眞之炁而實無物也至哉言乎妙哉虚乎此品開首云大道之宗萬法之祖運神於虚包孕萬有已將全旨揭明形形相相十句言煉虚之闔闢機關穹穹者天八句卽天象之昭垂示人工之默契人人皆具三寶人人皆秉一元三三一一總歸虚煉故厯厯詳言而復明結之曰總由有象以歸無象按之至實實而仍虚充虚之量萬變莫窮煉之爲要誠微妙玄通之眞訣彼一切虎龍鉛汞坎離水火等極形之肖極名之似名之形之不出一是也但此煉虚之妙抛卻卽走操之斯有聖不異凡仙與佛偶可見玄禪至詣本自相同煉虚之功萬眞莫異彼凡夫不知煉虚何能超界而物類更無論矣玄則空空靈無不通通靈啓玄妙秘寰中此四語是煉虚秘妙言玄靈則無滯機言寰中則有實証妙煉旣久時刻無懈斯鑰槖開然而萬象羅前矣葢須渾然無物聽其自然之生生若執靈往運意想非眞是不識其程也形聲動靜表裏圓明叩之寂寂聽之冥冥煉虚還虚也若愚若晦若亡若存存乎至道煉虚歸眞煉虚合道也噫玄靈妙道煉虚秘傳天仙之丹法大羅之捷徑也萬古眞宗幸於此經拈出靈妙超昇品第九紫微星君曰天清地寧萬物化生生生化化充周無量體道之精運玄之虚人若異物視物爲靈人之靈者以本原靈血肉之軀復何異等穢濁之體六根藴内七情洶洶二六時中自少而壯自壯而老由生而死皆此藴洶㤐㤐懘懘以穢濁故㤐懘固結如此滔滔何以上昇是由本性養其天根知生而死死卽生生超乎軀殻運乎精霛洞洞朗朗變化通神由小入大自外入内杳冥渾含一達百澈上通下起離去五障明乎五玄神之化之昇之卽之此一息者貫乎千億由卽而離求深入妙貫一空屢如顏如曾得其際者乃無不通三元會合萬派歸宗是一是二與道大適片片之光頃千萬丈寸寸之步一躍天上玉京高迴舉首望之仙階層疊移足可躋有先入者後則隨之前有招者後卽趨之此不彼讓古不今殊惟齊乎物乃超萬物惟達上乘乃出凡塵功在内叩叩之瑩瑩必先必後無作輟幾是在持循有恒若性還我太虚靜中卽証靜不外動靜之動之無不神合與太清遊與大道偕上顧仙儔班躋自列如是證澈此爲騰昇回翁守此接引羣生我祖我法爲度有成天機洩處處處端倪爾法子等從之如歸同登彼岸共悟玄機法壇慶遠一啓流光更堅定力嗣派綿長吾奉勅演秘靈妙章人人奉行利濟無疆此第九品以超昇收結全經須知超昇無功功仍在前而煉虚尤爲總持要門開首六句是接言煉虚眞功而並及其效卽陰符經所謂觀天之道執天之行盡矣之義下言人之異物惟在此本原之靈若血肉之軀穢濁之體六根七情二六時中㤐懘固結則非虚矣何以超昇哉是由本性十二句乃煉虚而漸及歸眞之妙所以上通下起離去我三品經中所言之五障明乎我三品經中所示之五玄神之化之昇之卽之也又恐人或蹈茫蕩之空而無以爲超昇之本故特示曰此一息者貫乎千億由卽而離求深入妙此中消息具微妙玄通之幾爲大羅朕兆之倪仍須口傳心授乃能澈底通明非可依文解義也貫一空屢八句言儒道與仙佛之道無異所謂明德所謂一貫所謂危微精一之傳胥是道也片片之光八句言超昇之實境有先入者六句朂勉壇中弟子之詞惟齊乎物乃超萬物所謂齊物者非齊乎物類也天目開處法界圓明一切塵凡境地皆是大光明藏此之謂齊物所以超出萬物之表而不爲世網所縛也惟達上乘乃出凡塵亦非三乘上中下之說義分三乘本屬權敎玄元妙旨直契佛宗不但誦經禮拜茹素參禪及坐功運氣數息觀想等有作有爲之事不是上乘法卽領會微妙直契淵杳亦非上乘之道何也眞玄至妙非可言詮說空著空仍爲狂慧是必先窺破太極而有允執厥中之妙圓成法界而証拈花微笑之眞然後千錘萬鍊妙入玄元眞境乃能眞超凡塵而至無上也是功惟在内叩叩之瑩瑩卽邵康節所謂更看清光表裏眞也必先必後四句言功須持久還我太虚九句乃出神入化後之大成境地與三清交光與大道偕行入無出有神通變化隱顯莫測俄頃萬里故曰如是証澈此爲騰昇也回翁守此接引羣生乃紫微大帝囑我流通知我本願如是也我祖我法祖謂圓明道姥法謂靈妙眞經爲度有成葢指覺源壇中弟子而言也天機洩處處處端倪仍統言九品之妙爾法子等四句勉壇中弟子之詞法壇慶遠四句言覺源壇敎化廣遠法派綿長是壇本係吾偕觀音大士同開說戒寶所以爲超拔人才之地洵萬劫難逢之奇遇當年懸記原有廣化三百年洪啓天仙派得淨土者若千人得天仙者若千人得超生死而免輪迴者又若千人一一自響應如桴鼓後學聖眞皆能証知此時亦不必顯言也末四語總結全經乃紫微大帝述係先天斗帝勅演琅函妙典萬古長留以爲我道門秘寶曰人人奉行利濟無疆其中仍隱寓道妙非可筆之於書姑疏解其大略如是永存覺源壇中至心皈命禮一炁梵天三光聖母駕遊日月二宮前勅賜雷霆大法主威光赫奕妙相圓明接引羣生超離諸苦大悲大願大聖大慈聖德巨光天后圓明道姥天尊此亦斗帝寶誥全經皆帝勅演故起末皆載一誥俾誦經者至心䖍禮知所皈向旣可感召垂光亦不忘本源之意也收讚經傳奕世廣振玄風九皇勅演大丹功紫極妙難窮澈證虚空天心造化工大聖先天圓明道姥大天尊三稱此收讚與前香讚首尾相應紀傳經之異遇括靈妙之眞詮一字一擊節皆宜細心體味而梵音廣演卽與靈響相通又正具有不可思議妙用在三皈自皈依道當願衆生常侍天尊永脫輪迴自皈依經當願衆生生生世世得聞正法自皈依師當願衆生學最上乘不落邪見此道經師三寶與釋門三皈同旨言似淺近義實精深道門功課常行之又紫微星君寶誥三皈後宜䖍誦九遍仰答垂典化度之恩謹爲補出至心皈命禮大羅天闕紫微星宮尊居北極之高位正中天之上佛號金輪熾盛道稱玉斗玄尊璇璣玉衡齊七政總天經地緯日月星宿約四時行黃道紫垣萬象宗師諸天統御大悲大願大聖大慈萬星敎主無極元皇中天紫微北極大帝斗帝勅演九品靈妙眞經疏解後跋此經爲萬古道門鉅典斗帝垂慈特勅紫微星帝於九皇法會頒示九品而統名之曰靈妙眞經一曰緣起靈妙之根原也二曰持心靈妙之樞紐也三曰解脫靈妙之顯現也四曰精進靈妙之功候也五曰布施靈妙之運行也六曰離欲靈妙之孕育也七曰清淨靈妙之明澈也八曰煉虚靈妙之神化也九曰超昇靈妙之圓成也就平實簡易中將玄通微妙眞功次第指出俾人人本此靈妙可以直造天仙地位洗盡從來丹家譬喻重濁之習今又得孚佑上帝疏解益覺經旨洞明如日月麗天朗無纎翳並䝉垂示寶偈曰天仙正覺派綿長廣化洪開大道場我欲度人無量劫彌羅誓愿總無疆試看修持不計年好把玄功靜裏參固精煉虚皆妙訣眞成道器足超前數語中包羅秘旨默寓眞機洵非個中人不能解非明了後未易行也小子覺質本庸愚功殊疎懈邇復平心自按除一點誠心外曾無寸長今仰䝉特諭跋誌是經僅抒心光所明以答天鑒之赫自知管窺蠡測不足以仰贊高深惟願同志之士共凜此經所在有無量天神上聖護持宣揚果能淨信誠求定可心解實證莫僅作人間世語言文字觀也廣化弟子惠覺薰沐敬跋
