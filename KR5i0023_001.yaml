front:
  text: 先天斗帝敕演無上玄功靈妙真經重刊道藏輯要先天斗帝敕演無上玄功靈妙真經孚佑上帝純陽吕祖天師疏解
  hash: sha256:421087c0af9ad55ee05bb5e455e50a3b21dc05fba5e59d24f4989eb124b64024
  markers:
  - {type: page-break, offset: 14, content: '', id: CK-KZ_KR5i0023_01p001a}
body:
  text: 斗為天樞玄功之祖今逢時節因緣先天斗帝敕演此無上真經為天仙家至玄之功故曰玄功曰靈曰妙即直指玄功之至精微處此經九品實為金丹妙典洗盡從來譬喻隱祕之詞使人人共由大道直證天仙後學聖真幸寶玩之莫易視也香讚玄靈妙典萬古真傳圓明道寶麗諸天祕密個中筌九九重宣慈濟永無邊大聖先天圓明道姥大天尊三稱此香讚為諷經最要科儀寶號三稱即皈身皈命皈神之至意也至心皈命禮西天竺國大智光中真空妙相法王師無上玄元天母主金光爍處日月濳輝寶杵旋時鬼神失色顯靈蹤於塵世衛聖駕於閻浮衆生有難若稱名大士尋聲來救苦大悲大願大聖大慈聖德巨光天后摩利攴天大帝圓明道姥天尊此斗帝寶誥虔誠禮誦感應至神有不可思議功用讚偈本壇恭逢斗帝聖誕舉行慶祝典禮幸蒙慈照普被恩光敕演無上玄功靈妙真經九品洵萬劫之難逢亦大慈之隨應無極子謹稽首拜手當壇呈偈曰瑤天大法祖大願度衆生敕演靈妙品慈悲無等倫玄元通啓徹萬載荷深恩先天原一氣著經闢鴻文大覺慈尊法無緣不是因一超千古劫一度萬含靈此法無上法此功無上乘諸天齊赴會萬法盡歸宗覺是天地朗源從萬派清一闢鴻濛路俯垂現在恩前前並後後同徹大道根為説靈妙法靈妙即真經九九通玄祕三三是一源合同而神化由凡入聖真是大慈悲願顯大法通神盡人齊皈命敬信永奉行吾此偈已將全經祕妙隱括無遺先指明壇地為覺源精舍傳經之曰即係在九皇慶祝期內此九品真經傳之非偶必因地因人因時而後法祖本大願力具大慈悲沛大恩澤乃於大覺慈壇著經闢文乘因緣以超劫度生也此無上法無上乘洵萬劫難逢之奇遇萬古不傳之妙寶九九玄祕與三三一源合同神化大道之根歸宗於是左宫星君讚曰妙法道祖普度羣生臨壇説偈顯真經義徹圓靈一點列高真萬古千年派衍深即是大慈心此言我天仙派由此經廣衍以成化度萬古千年學道之人共相繼續以為金丹法派正傳所以經內亦云一起參證派入天仙又曰筏是法筏繫於覺壇又曰回翁守此接引羣生也先天斗帝圓明道姥大天尊寶訓斗萬天之上萬法之宗玄通微妙是真功拜禮從容日月參明在此中法不説來法無窮真是虛空覺得圓靈識性同誓願深宏普度此羣蒙道心現處即是化工蒂固根深千秋壇運通喜氣溢寰中大地無遮仁慈利濟大法無上宫道祖法壇派遠綿長功修度成爾法子等衆曰禮所禮能禮所禮不必朝拜為朝禮趺坐冥心即是禮禮到恍恍惚惚是能禮禮到空空玄玄是能禮能禮靈妙真玄訣禮到升騰是真禮道祖壇中所呈悉如律令施行敕斗帝此訓揭全經道蘊為敕演鴻綱萬古玄真斯為祕諦真一字一蒼胡頡寶上合三清三洞之真文下開萬天萬法之真宗不可端倪不落詮解蓋緣我覺源法壇將綿長此天仙法派而功修有度成者故直示心傳洞達無隱篇中切切指點屢屢唱嘆玄通微妙包孕無窮覺得圓靈如是如是靈妙緣起品第一紫微星君曰藐爾一身配乎三才靈踰萬物至寶內含與生俱足無區聖凡唯彼克葆上際下蟠一朝失守人禽攸關此不彼顧我無爾判有大智炬如日之懸有接有繼為範為間莫推莫挽或照或監得其宗主至極至玄明明在上早濟早援莫之自溺無息汝肩以月以日積纍如年有其一得後不越先唯其通復無外中邊此真一息功在綿綿盡天地量包古今賢惟功惟實自證自參一起參證派入天仙道法之祖永度人天人天普度斯為妙原吾奉法敕著靈妙篇開章一義深深淵淵人人了了即躡瓊巔仙祖俯偈然然其然九品皆闡靈妙此篇九品之緣起也紫微星君為天北極妙握仙柄是萬星宗主即性命根源斗帝敕瑤天第一吉星於古今第一覺壇傳古今第一道典誠天仙家金丹祕寶真傳開口説一身配三才含至寶已是徹上徹下徹始徹終路頭且直揭曰有大智炬如日之懸是惟以圓明大道為清靜真宗非得其宗主未易窺此至極至玄之妙體通復而達中邊也然又恐人未知虛空中真有妙有又切示根蒂曰此真一息功在綿綿由實功參證則派入天仙自能契道法之祖而永度人天矣深深淵淵靈妙之實功也人人了了靈妙之實境也高躡瓊巔而瑤天在目矣靈妙持心品第二紫微星君曰爾時斗姥慈尊坐無極宫照臨下土慈悲衆生發普濟願施大慧力顯大神通嗟爾衆生罔識本性具足圓明沈淪漸晦於是乘大法會降大法壇説明大乘啓彼昏昏欲求天仙先還本原本原之地不可方物即之有象探之甚深窮竟萬變不離方寸人具此物不以物名名之以心仍滯於名此名此象莫測其靈靈即本原非此塊心欲力持者持此為經吾道曰明乃是明明明何以啓仍歸本根此根觸法不可形形操存有要晝夜持循如保嬰兒如對至尊如防堤邊如馭羣英莫撓擾散毋弛脫紛有操有縱可相可形放之則逸滯之不靈我與爾靜乃攝真精靜猶不靜動亦堅貞誠虛體用包孕無垠從此充極不越此經是人是我悉自交營上乘顯緒法具夙乘其如彼岸即以爾登有大世界為大纍縈欲河不涉摧破愁城無多現相得靜斯呈靜呈相現自無勞乘我不求爾爾不我侵斯為入手先證分明持住如是乃望前程慈尊唯然先照天君道外無心心外無道惟持斯靈惟靈斯妙此章特言持心是聖凡第一大關鍵先敘敕演因由乘九皇之法會降覺源之法壇特垂此大乘經典以為天仙持心妙法夫本原之地彌綸宇宙而實不離此方寸之間曰即之有象探之甚深持之之法也操存有要晝夜持循綿綿密密火候足則金丹立成下四句形容持心之方即養丹之妙諦又戒之曰莫撓擾散毋馳脫紛誠恐人徒事虛靈故曰有操有縱可相可形放之則逸滯之不靈我與爾靜乃攝真精是性命雙該體用俱備曰包孕無垠已全示人真蒂矣持之永久而有不超登彼岸者乎此大世界即法界即鼎爐但不為欲愁煩惱等障蔽則真相立現一一遞證分明矣持住如是乃以如是持心非滯守中宫收心腔子裏便以為求放心者比也噫如是之法若未能聞遽欲持心何由而得靈妙之消息乎靈妙解脫品第三紫微星君曰太空一點萬象虛涵浮雲苒苒飄飄無礙體相通徹不滯端倪問之太虛白雲無歸夫人之心稱曰最靈最難降伏莫此為甚如是持循是能降伏爾等衆生既降伏已乃可復靈靈何不靈是有妙法法只一法解脫真訣嗟爾羣靈膠粘塵窒日入日深如何是出有此解脫如起沈疴豁然清爽如出重圍坦坦蕩蕩如闢暗室廓然光明如遇荆榛一毫不挂此大智慧是大瀟灑求仙求佛脫離苦境境苦不苦不苦苦境此以終身總不能振如蠅附羶風不能逐如蛾赴火扇不能推自甘自結乃無能為由降伏故力大於身舉手即開舉步即入舉頭即見舉念即獲如是解脫解非他解脫則真脫玄元妙楔一棒打破前章言持心固是聖凡關鍵然非解脫止是色身邊事縱極精進亦無成就故此篇尤為喫緊為人處但解脫非易總緣一點靈明窒於塵緣日入日深如何是出故必如是持循如是降伏而後能如是解脫也如起沉疴八句是極形容解脫瀟灑之妙境苦不苦十句又申言所以不解脫之故總欲人自解自脫以玄元之妙楔打破日入日深之塵窒原是力大於身果能如是自然舉手即開舉步即入舉頭即見舉念即獲也一棒二字具有微義後學聖真所宜著眼切莫孟浪讀過靈妙精進品第四紫微星君曰於穆維天穹窿其體視之不見聽之不聞談之者衆上之也難惟仙佛祖先自上升繼發慈願纍劫度人人真能求無不度成求度善信既諸解脫從如何證此無他求唯自精進人心了明結習未離非復舊染即隋四肢中心瞭然在自證前日復一日年復一年甫其進步效未即著欲速易退至道難幾魔橫障竪處處阻撓心有所攝動處惕然由不制伏礙則形焉亦曰心性制諸魔外此則莫達彼受其纍洞非不明左繞右縈明不是明真繞真縈習成莫救長此隳頽分明前路不行不達是無阻隔終莫引援又其結深漸積為性如是自安前程自棄雖具大願兼大法力莫能救濟誠何自啓大丈夫起此心直的如矢在弦求之專一志正體端無能纍我一發中堅此不可移彼無能助如趨如赴或失之後孜孜皇皇不惜其他唯有一是無紛無訛先後一致終始同誠綿密之功不息不爭人見云何志趣如生此有正訣各不為謀不費慳財不纒俗塵只一猛勇立進無垠要求真功須問真心好無以上所欲莫甚若加策勵愧怍悲懼有此等心益堅前念黽勉自課早不宜晚遵之而行前望不遠此章言精進之功全在克去舊染制伏身心以靈明寶鑑返照省察刻刻使惺惺常存而魔外自袪蓋人生結習既深所以障業重而智光晦必須精進專一志無時不正體無時不端則內外雙修靜動交養方可一發中堅自無不破之的如趨如赴六句是形容精進極專一處無後先無終始惟以一誠貫注此綿密之功總如是之不息不爭而已是即精進正訣故曰要求真功須問真心好無以上所欲莫甚蓋退亦此心進亦此心塵窒亦此心解脫亦此心但時刻常持靈妙之心以求解脫而於道也好無以上問之於心所欲莫有更甚於此者則不求精進而自精進矣又恐久而或怠故又示人當常起愧怍悲懼等心以自加策勵則前念益堅後功無懈自望前途不遠而入道矣靈妙布施品第五紫微星君曰佛法三乘首闡金經明心見性無住著相祇樹園中莊嚴佛土恆河沙數七寶布施不若誦持為功德優布施無量亦無等差七寶弗如是為誦持爾衆生等當無盡著視根於眼通此眼界洞徹諸天上矚真光下及含靈所有利益河沙難量聲觸於耳以此耳順天籟遙通八方和樂中內旁徹聰以利濟超離億數鼻舌身意亦如是觀此六根者是住非住著之斯蔽達之即通惟我自達無借於外以我住我事幾成敗前望卻阻無本具性內慳自障不超古今大喜捨願斯脫蒙塵何繫何縈一推即遠有諸善緣乃接續至佛乘教明吾道益尊身有三寶是則真靈珍惜護持不遺寸心欲求此寶先行利濟六根布施三寶斯貴太上遺經只此一義乘分上下道惟獨位亘古今來瀰淪布濩通被十方周遍三界恢之彌廣擴之無窮操之於內不踰寸地覆載生成充乎其際惟此一尊根於天地不漓不雜只在自持有諸內者不奪於外附於後者撒手施去真視真聽自入玄元生生滅滅萬趣超然自持此念不謀他人不踰霎頃一持一得一噴一醒夫然後效真實前程布施原兼內外財施法施皆外也金剛經云不應住色布施不應住聲香味觸法布施應如是布施不住於相蓋言應無所住行於布施也此經於精進之後即繼之以布施其義甚深其道甚大非僅七寶恆河沙數布施不足以言布施即身命布施亦不足以言布施何也以猶有住著即非靈妙布施之至道也故經中云此六根者是住非住著之即蔽達之斯通明言無住相布施之妙又恐騖空者涉於茫蕩因直指曰身有三寶斯則真靈珍惜護持不遺寸心俾人知妙行無住之地而並不著妙行無住之迹乃為形神俱妙之道故曰六根布施三寶斯貴太上遺經只此一義乘分上下布施之察於上下也道惟獨位布施之會於歸極也亘古今來六句仍言布施之充乎其量操之於內不踰寸地仍言布施之樞紐妙握真宰既不落空仍無住著此玄靈妙道所以於佛乘同契真空妙有妙有真空玄禪之功皆不外是彼以昭昭靈靈為佛法者必不知修大覺金仙破徹六陰之實詣以色身為道法者必不知偽道修形非大羅天仙之金丹妙道又不知佛所斥之十種仙原非三清大道即我輩亦以此十種為非也今先天道祖破萬古之盲瞶示妙道於一乘就金剛之旨切實言之由此布施之妙至於真視真聽則天眼天耳皆通自漸入玄元真境是真實前程也布施之義大矣哉靈妙離欲品第六紫微星君曰人身易敝真性不漓性全其真有守則見千萬纍劫如是衆生各具一點此是大同分見合見維彼聖真真則克明昏濁凡夫性失其真真何以失非其本原如彼乘珠寶光透瑩沉於深淵淤泥其體不知愛惜常住汙泥若求此者拔之於淵洗濯其身即洗即拔真光乃露是珠不染只爭此功高明古鑑無不呈照久埋深阱塵土蒙覆不求懸照任爾塵封遇有識者起之地下濯磨其面拂拭其光光乃煥發是鑑不埋自甘塵土光則不徹誰執其咎人之真性如鑑如珠凡夫不明如在泥塗此為大欲纍劫纒縛不脫不離如輪之轉輾轉相循失其本面求超入者離欲為尊此之謂離不容一息華藏微塵有欲必爭其示之界不少寬貸能離則人不離非類仙佛慈濟離此達彼總不離此莫能望彼是真離者其真立見不疾不速功爭斷續良農去莠一日不盡再加功深盡淨乃竟不愼始勤必然終怠怠不能離勤亦非離爾欲仍熾自荒於嬉惟知綿綿其離則專不見為離離則真全此斫真關圓靈現前我法我訣先賢後賢循之者聖執之者凡杳冥虛無渾合自然離欲為修養要緊關頭顯佑黃子云人生血氣之纍天之授於庸衆尤淺授之學道者偏深斯言最合試看人每於大有得後欲念轉似較平日更濃即可驗也此品列於精進之後是憐愍學道之人於將成時駕一寶筏佛法曰離欲尊金經曰離欲阿羅漢與吾道同旨昔月宮天曜尊者奉寶光幽照如來法旨云無上妙道是先從身心上討本原離欲之旨是無上玄元之妙此欲字千看萬看總要從皈依心定住離者去而遠之之義要離得實在有一分便真一分能真得此字祕訣欲字方可通身退去矣離欲一義即是徹上下真根蒂可仙可佛即為頂上圓光並在我覺源壇垂示寶偈曰清虛一氣本圓靈悟徹浮空道運升只向空中橫竪取一人一點即分明正於此品大相印合且欲字要看得細所賅甚廣凡一切常態世情及愛慕因緣稍有動心即謂之欲必須一塵不染一絲不挂方離得淨盡而三界可超人生一點圓明本來萬古常存如珠如鑑經中指示甚明前半既詳言之矣而復點明曰人之真性如鑑如珠凡夫不明如在泥塗此為大欲纍劫纒縛此不必逐字訓詁學者總宜細心體味經中又示警曰不脫不離如輪之轉輾轉相循失其本面言不離欲即不能出輪回生死而日染日深將失其本面矣恐人將離字看得粗因申言之曰此之謂離不容一息華藏微塵有欲必爭其示之界不少寬貸此理欲機關判別在毫芒之際其界稍有不清則汨淆其有守即見之性明而不得洗濯拂拭之功是以昏濁凡夫難成聖真也華藏微塵句下爭字界字含無上玄微之妙訣未易指破急須著眼仙佛慈濟四語言玄禪同此一乘是真離者其真立見功在於離欲效在於見真欲離得愈遠真見得愈真此三教至詣之的旨不疾不速功爭斷續八字乃金丹妙道之正傳淺者見淺深者見深由人自證未可言詮良農六句始終一勤然不知綿綿之真功則不但怠不能離即勤亦非離何也見以為離仍著法邊際此中微妙非箇中人不能語非過關人不能行故曰不見為離離則真全此斫真關圓靈現前噫全真真全前現現前萬古妙道大哉玄元觀經云我法我訣先賢後賢循之者聖執之者凡已分明自下注腳矣至末云杳冥虛無渾合自然此非泛作闊落語亦非虛摹離欲景象此八字聖凡俱遣我法無執杳冥二字賅天仙之全功虛無二字乃金丹之妙鍊渾合二字實飛升之階梯至自然則形神俱妙矣此離欲之實驗也靈妙清淨品第七紫微星君曰渾虛太清玄明真淨機緘初肇無物無名此為至極玄元杳冥無原無極無為無爭三才既定陰陽道著道還本原渾沕無形纍世纍劫道心人心緣心而具性即生情情緣情結情結障深非道纍心非心纍道心不纍身性不纍情朗朗圓明高懸古今業身業積乃纍心性此清淨體業濁塵紛種種愛欲蒙蔽性明一緣一障障濁河深情積為愆愆結惡重是不掃除愈熾愈焚嗔貪煩惱怖恐畏驚如是輾轉淨域千里要自逃匿牽縛莫解爾諸法子由堅定持得離欲天緣離欲故前路坦坦蓮出汙泥品愈清潔若由火種清則無上金剛火煉堅貞其體若陶化工質堅無等此清淨者入聖階梯證玄妙境汙泥亦清囂市亦淨深山不清古洞不淨清清淨淨不呈於境有尋得處此境乃真以塵網身何處尋境我與爾衆同皈大道欲尋此境叩之太上太上無為是為至上有為之為即修無為為為非有有有非為無為非有有為非無無無有有為為有無由有為故入於無為由無為故乃至非為非為之為乃無不為乃可有為乃可無為如是説已清淨其幾由清淨故乃徹乃希希有妙道法力通神不神之神神乃法神法云身法非法乃法非法非非法乃真神由中真入至道目前何為視聽瞻之在上上不在上是上之上無上之我其為大羅人由清淨厯諸參證玄之與玄如通其竅要即臻者如渡求筏筏是法筏繫於覺壇鼓浪乘風浪靜波恬棹通彼岸明月在天不要妄乘舉頭即是此何以故天不外天月非天月滴滴歸根即於此宅我道祖壇具此法筏載清載淨綿綿不竭更證真源諸法莫説此承上章而言清淨固不在境地上論亦非僅潔齊身心已也玄妙之境是為清涼淨域人能脫然離欲方可直入真界觀開首云渾虛太清玄明真淨機緘初肇無物無名此為至極玄元杳冥六句可見經旨甚深未容淺窺也爭者理欲相爭之幾人能人此清淨真境則一切事物皆可由妙觀察智化為妙明圓覺之境處處無礙故曰無為無爭夫人心道心判在危微外緣最易膠粘人每因業而纍身因身而纍心因心而纍性種種愛欲蒙蔽性明皆由塵情為之顚倒情積為愆愆結惡重以致朗朗圓明之淨域輾轉背馳奚啻千里之遙是必痛自掃除將嗔貪煩惱恐怖畏驚等念打掃得空空洞洞堅定自持得離欲天而後前路坦坦矣然又不得厭喧求靜避俗求真墮入二乘甲裏故曰蓮出汙泥品愈清潔若由火種清則無上金剛火煉堅貞其質若陶化工質堅無等是言正好就世緣塵情易染難斷處淘鍊清淨法身方是入聖階梯所謂在世出世在塵出塵也且玄妙之境果能實實印證則汙泥亦清囂市亦淨古來大羅天仙或依糞堆雪窖或入酒肆淫房而清淨之體自在習染之汙愈明否則即深山亦不清古洞亦不淨清清淨淨原不呈於境而自有真清真淨之實境非叩之太上何能得之耶太上無為十八句是闡大道之妙即清淨之原也希有妙道八句是言大法之神惟清淨可入也故曰由中真入至道目前至何為視聽六句隱指大羅之天樞默契清淨之端倪天機隱祕未敢遽泄後學聖真誠身證夫玄之與玄自然能通其竅矣夫至道微妙固不易臻而要非無門可入我明明設一渡世法筏繫於覺源寶壇只要人能清淨皈依力持五戒性命雙修則棹通彼岸而明月在天矣故曰舉頭即是然天非外天也月非天月也人所本具各有性天性月根於身之真宅但不為氣拘物蔽則青天朗月何有纎翳乎滴滴歸根即於此宅是雙關語亦是如語實語蓋鑒我真誠永久如是慈腸一片普度世人恐彼悠忽者當面錯過機緣故切指其地為萬古常存億劫難逢之寶地而又申言之曰我道祖壇具此法筏載清載淨綿綿不竭更證真源諸法莫説噫慈悲指點之意至深切矣吾亦惟是常持初願永護是壇以仰答天敕之重與大士菩薩共圓成此利濟之心在源中作清淨筏以待飛渡者飛渡無難始於持戒終於清淨而已靈妙煉虛品第八紫微星君曰大道之宗萬法之祖運神於虛包孕萬有形形相相色色空空只此上下通幽徹微祕密玄靈闔闢之機虛中涵養章美於外細無不入大莫之載穹穹者天日月照臨四維八極度量難齊星羅碁布象麗其上聲臭閴寂莫測莫名扣萬啓一乃含大美大寶曰三精與神氣與身具存先身而立豈立身先更先天地無始劫來於今罔替一人一具千萬化身千萬具足具足之體是萬還一其昭明明其繫密密存乎人者莫良於此三歸一物一化而三是三非三是一非一非三非一一一三三非三非一是一是三曰惟此寶具足莫參總由有象以歸無象按之至實實而仍虛充虛之量萬變莫窮煉之為要名之難紀為虎為龍曰鉛曰汞於坎於離位置其地木植火炎又充其類極形之肖極名之似名之形之不出一是拋卻即走操之斯有聖不異凡仙與佛偶凡夫異等惟此一本增減不形生滅無盡具此大者百體率從從之百歧乃生色相相不一相四相終纍誰為空者莫煉其至煉則超之非比物類胎卵濕化蠢動而已佛性亦靈亦識其具矧靈於物胡不煉此可為可追可進可啓玄則空空靈無不通通靈啓玄妙祕寰中鑰槖開然萬象羅前渾然無物自然生生執靈往運不識其程形聲動靜表裏圓明叩之寂寂聽之冥冥若愚若晦若亡若存存乎至道煉虛歸真此品乃玄通微妙真功昔吾與百丈佛祖同降覺壇祖云道曰靜釋曰止靜與止一而已一者何惟心造心本虛無方體煉其虛道在邇青華上帝亦云結丹之道一而已矣一無他虛而已矣煉丹者煉虛也虛非空空之虛乃實實之虛虛非散散之虛乃渾渾之虛煉虛而成其為虛則丹成矣形神俱妙者形神俱虛也又曰煉丹件件皆虛黍珠一粒渾然太虛之體又曰修持之要千聖萬真總歸寂滅學道而不至於寂滅未有能度劫者仙佛有分在煉性煉氣之間究竟到得無上根源就是氣也是性長生也是寂滅何也仙家所煉之氣蓋有超出於陰陽五行之外者所謂元始以來一點靈光渾融周遍太和至真之氣而實無物也至哉言乎妙哉虛乎此品開首云大道之宗萬法之祖運神於虛包孕萬有已將全旨揭明形形相相十句言煉虛之闔闢機關穹穹者天八句即天象之昭垂示人工之默契人人皆具三寶人人皆秉一元三三一一總歸虛煉故厯厯詳言而復明結之曰總由有象以歸無象按之至實實而仍虛充虛之量萬變莫窮煉之為要誠微妙玄通之真訣彼一切虎龍鉛汞坎離水火等極形之肖極名之似名之形之不出一是也但此煉虛之妙拋卻即走操之斯有聖不異凡仙與佛偶可見玄禪至詣本自相同煉虛之功萬真莫異彼凡夫不知煉虛何能超界而物類更無論矣玄則空空靈無不通通靈啓玄妙祕寰中此四語是煉虛祕妙言玄靈則無滯機言寰中則有實證妙煉既久時刻無懈斯鑰槖開然而萬象羅前矣蓋須渾然無物聽其自然之生生若執靈往運意想非真是不識其程也形聲動靜表裏圓明叩之寂寂聽之冥冥煉虛還虛也若愚若晦若亡若存存乎至道煉虛歸真煉虛合道也噫玄靈妙道煉虛祕傳天仙之丹法大羅之捷徑也萬古真宗幸於此經拈出靈妙超升品第九紫微星君曰天清地寧萬物化生生生化化充周無量體道之精運玄之虛人若異物視物為靈人之靈者以本原靈血肉之軀復何異等穢濁之體六根藴內七情洶洶二六時中自少而壯自壯而老由生而死皆此藴洶怗怗懘懘以穢濁故怗懘固結如此滔滔何以上升是由本性養其天根知生而死死即生生超乎軀殼運乎精霛洞洞朗朗變化通神由小入大自外入內杳冥渾含一達百徹上通下起離去五障明乎五玄神之化之升之即之此一息者貫乎千億由即而離求深入妙貫一空屢如顏如曾得其際者乃無不通三元會合萬派歸宗是一是二與道大適片片之光頃千萬丈寸寸之步一躍天上玉京高回舉首望之仙階層疊移足可躋有先入者後則隨之前有招者後即趨之此不彼讓古不今殊惟齊乎物乃超萬物惟達上乘乃出凡塵功在內叩叩之瑩瑩必先必後無作輟幾是在持循有恆若性還我太虛靜中即證靜不外動靜之動之無不神合與太清遊與大道偕上顧仙儔班躋自列如是證徹此為騰升回翁守此接引羣生我祖我法為度有成天機泄處處處端倪爾法子等從之如歸同登彼岸共悟玄機法壇慶遠一啓流光更堅定力嗣派綿長吾奉敕演祕靈妙章人人奉行利濟無疆此第九品以超升收結全經須知超升無功功仍在前而煉虛尤為總持要門開首六句是接言煉虛真功而並及其效即陰符經所謂觀天之道執天之行盡矣之義下言人之異物惟在此本原之靈若血肉之軀穢濁之體六根七情二六時中怗懘固結則非虛矣何以超升哉是由本性十二句乃煉虛而漸及歸真之妙所以上通下起離去我三品經中所言之五障明乎我三品經中所示之五玄神之化之升之即之也又恐人或蹈茫蕩之空而無以為超升之本故特示曰此一息者貫乎千億由即而離求深入妙此中消息具微妙玄通之幾為大羅朕兆之倪仍須口傳心授乃能徹底通明非可依文解義也貫一空屢八句言儒道與仙佛之道無異所謂明德所謂一貫所謂危微精一之傳胥是道也片片之光八句言超升之實境有先入者六句朂勉壇中弟子之詞惟齊乎物乃超萬物所謂齊物者非齊乎物類也天目開處法界圓明一切塵凡境地皆是大光明藏此之謂齊物所以超出萬物之表而不為世網所縛也惟達上乘乃出凡塵亦非三乘上中下之説義分三乘本屬權教玄元妙旨直契佛宗不但誦經禮拜茹素參禪及坐功運氣數息觀想等有作有為之事不是上乘法即領會微妙直契淵杳亦非上乘之道何也真玄至妙非可言詮説空著空仍為狂慧是必先窺破太極而有允執厥中之妙圓成法界而證拈花微笑之真然後千錘萬鍊妙入玄元真境乃能真超凡塵而至無上也是功惟在內叩叩之瑩瑩即邵康節所謂更看清光表裏真也必先必後四句言功須持久還我太虛九句乃出神入化後之大成境地與三清交光與大道偕行入無出有神通變化隱顯莫測俄頃萬里故曰如是證徹此為騰升也回翁守此接引羣生乃紫微大帝囑我流通知我本願如是也我祖我法祖謂圓明道姥法謂靈妙真經為度有成蓋指覺源壇中弟子而言也天機泄處處處端倪仍統言九品之妙爾法子等四句勉壇中弟子之詞法壇慶遠四句言覺源壇教化廣遠法派綿長是壇本係吾偕觀音大士同開説戒寶所以為超拔人才之地洵萬劫難逢之奇遇當年懸記原有廣化三百年洪啓天仙派得淨土者若千人得天仙者若千人得超生死而免輪回者又若千人一一自響應如桴鼓後學聖真皆能證知此時亦不必顯言也末四語總結全經乃紫微大帝述係先天斗帝敕演琅函妙典萬古長留以為我道門祕寶曰人人奉行利濟無疆其中仍隱寓道妙非可筆之於書姑疏解其大略如是永存覺源壇中至心皈命禮一氣梵天三光聖母駕遊日月二宮前敕賜雷霆大法主威光赫奕妙相圓明接引羣生超離諸苦大悲大願大聖大慈聖德巨光天后圓明道姥天尊此亦斗帝寶誥全經皆帝敕演故起末皆載一誥俾誦經者至心虔禮知所皈向既可感召垂光亦不忘本源之意也收讚經傳奕世廣振玄風九皇敕演大丹功紫極妙難窮徹證虛空天心造化工大聖先天圓明道姥大天尊三稱此收讚與前香讚首尾相應紀傳經之異遇括靈妙之真詮一字一擊節皆宜細心體味而梵音廣演即與靈響相通又正具有不可思議妙用在三皈自皈依道當願衆生常侍天尊永脫輪回自皈依經當願衆生生生世世得聞正法自皈依師當願衆生學最上乘不落邪見此道經師三寶與釋門三皈同旨言似淺近義實精深道門功課常行之又紫微星君寶誥三皈後宜虔誦九遍仰答垂典化度之恩謹為補出至心皈命禮大羅天闕紫微星宮尊居北極之高位正中天之上佛號金輪熾盛道稱玉斗玄尊璇璣玉衡齊七政總天經地緯日月星宿約四時行黃道紫垣萬象宗師諸天統御大悲大願大聖大慈萬星教主無極元皇中天紫微北極大帝斗帝敕演九品靈妙真經疏解後跋此經為萬古道門巨典斗帝垂慈特敕紫微星帝於九皇法會頒示九品而統名之曰靈妙真經一曰緣起靈妙之根原也二曰持心靈妙之樞紐也三曰解脫靈妙之顯現也四曰精進靈妙之功候也五曰布施靈妙之運行也六曰離欲靈妙之孕育也七曰清淨靈妙之明徹也八曰煉虛靈妙之神化也九曰超升靈妙之圓成也就平實簡易中將玄通微妙真功次第指出俾人人本此靈妙可以直造天仙地位洗盡從來丹家譬喻重濁之習今又得孚佑上帝疏解益覺經旨洞明如日月麗天朗無纎翳並蒙垂示寶偈曰天仙正覺派綿長廣化洪開大道場我欲度人無量劫彌羅誓願總無疆試看修持不計年好把玄功靜裏參固精煉虛皆妙訣真成道器足超前數語中包羅祕旨默寓真機洵非個中人不能解非明了後未易行也小子覺質本庸愚功殊疏懈邇復平心自按除一點誠心外曾無寸長今仰蒙特諭跋志是經僅抒心光所明以答天鑒之赫自知管窺蠡測不足以仰贊高深惟願同志之士共凜此經所在有無量天神上聖護持宣揚果能淨信誠求定可心解實證莫僅作人間世語言文字觀也廣化弟子惠覺薰沐敬跋
